# Corrected Riesz-map operator preconditioning testcase
# ====================================================
# Same problem as r13_1_coeffs_nosources_norot_inflow_p1p2p1p1p2_nostab.yml,
# but solved with:
# - solver_options.symmetrize: parity sign-flip of the even test rows
#   (kappa, psi, q) -> symmetric indefinite system -> MINRES applicable
# - solver_options.riesz_preconditioner_type: theory: canonical H1 blocks for
#   s/sigma/p, L2 mass blocks for theta/u, and the total-pressure boundary
#   block coupling p with sigma_nn. This is the corrected continuous-theory
#   Riesz preconditioner; the exact algebraic Schur reference is
#   input/r13_schur_full_lu.yml.
output_folder: r13_riesz_minres

meshes:
  - ../../tests/2d_mesh/ring1.h5
  - ../../tests/2d_mesh/ring2.h5
  - ../../tests/2d_mesh/ring3.h5
  - ../../tests/2d_mesh/ring4.h5
  # - ../../tests/2d_mesh/ring5.h5
  # - ../../tests/2d_mesh/ring6.h5

elements:
  theta:
    shape: Lagrange
    degree: 1
  s:
    shape: Lagrange
    degree: 2
  p:
    shape: Lagrange
    degree: 1
  u:
    shape: Lagrange
    degree: 1
  sigma:
    shape: Lagrange
    degree: 2
stabilization:
  cip:
    enable: False
    delta_theta: 1.0
    delta_u: 1.0
    delta_p: 0.01
  gls:
    enable: False
    tau_energy: 0.001
    tau_heatflux: 0.001
    tau_mass: 0.01
    tau_momentum: 0.01
    tau_stress: 0.01

nsd: 2
mode: r13
heat_source: 0
mass_source: 0
body_force: [0,0]
f_s: [0,0]
f_sigma: [[0,0],[0,0]]

# Parity symmetrization + Riesz-map preconditioner
solver_options:
  symmetrize: True
  riesz_preconditioner: True
  riesz_preconditioner_type: theory

# MINRES on the symmetrized system with the (SPD) block-diagonal
# theory Riesz-map preconditioner: additive fieldsplit with exact subblock
# solves. The pressure and stress are grouped so the total-pressure boundary
# block (p + sigma_nn) is inverted rather than dropped by scalar field splits.
petsc_options:
  ksp_type: minres
  ksp_rtol: 1E-7
  ksp_max_it: 10000
  ksp_norm_type: preconditioned
  ksp_monitor:
  ksp_converged_reason:
  pc_type: fieldsplit
  pc_fieldsplit_type: additive
  fieldsplit_theta_ksp_type: preonly
  fieldsplit_theta_pc_type: lu
  fieldsplit_theta_pc_factor_mat_solver_type: mumps
  fieldsplit_s_ksp_type: preonly
  fieldsplit_s_pc_type: lu
  fieldsplit_s_pc_factor_mat_solver_type: mumps
  fieldsplit_p_sigma_ksp_type: preonly
  fieldsplit_p_sigma_pc_type: lu
  fieldsplit_p_sigma_pc_factor_mat_solver_type: mumps
  fieldsplit_u_ksp_type: preonly
  fieldsplit_u_pc_type: lu
  fieldsplit_u_pc_factor_mat_solver_type: mumps

regs:
  4000:
    kn: 1.0

polar_coord_syst: True
bcs:
  3000:
    chi_tilde: 1.0
    theta_w: 1
    u_t_w: 0
    u_n_w: 0
    u_x_w: 1E300
    u_y_w: 1E300
    u_z_w: 1E300
    p_w: 0
    epsilon_w: 0.0
  3100:
    chi_tilde: 1.0
    theta_w: 2
    u_t_w: -1.00 * sin(phi)
    u_n_w: +1.00 * cos(phi)
    u_x_w: 1E300
    u_y_w: 1E300
    u_z_w: 1E300
    p_w: -0.27 * cos(phi)
    epsilon_w: pow(10,+3)

convergence_study:
  enable: False
  exact_solution: esols/1_coeffs_nosources_norot_inflow_positive.cpp
  plot: False
  write_systemmatrix: False
  write_mpi_information: False
  rescale_pressure: False
  relative_error: True

postprocessing:
  write_pdfs: False
  write_vecs: False
  flows: []
  line_integrals: []

parameter_study:
  enable: False
  parameter_key: []
  parameter_values: []
